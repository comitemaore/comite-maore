security:
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
    #    Symfony\Component\PasswordHasher\Hasher\MigratingPasswordHasher
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
            algorithm: 'auto'

    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        users_in_memory:
            memory:
                users:
                    admin:
                        password: '$2y$13$h97IKzpvKSq78T2plCnXNe0CPXTCmqNVJlx3OD91BU9xCpjqXmVUC'  # bcrypt hash à générer
                        roles: ['ROLE_ADMIN']
                    root:
                        password: '$2y$13$h97IKzpvKSq78T2plCnXNe0CPXTCmqNVJlx3OD91BU9xCpjqXmVUC'  # bcrypt hash à générer
                        roles: ['ROLE_USER']
                    jaffar:
                        password: '$2y$13$h97IKzpvKSq78T2plCnXNe0CPXTCmqNVJlx3OD91BU9xCpjqXmVUC'  # bcrypt hash à générer
                        roles: ['ROLE_ADMIN']
                    user2:
                        password: '$2y$13$h97IKzpvKSq78T2plCnXNe0CPXTCmqNVJlx3OD91BU9xCpjqXmVUC'  # bcrypt hash à générer
                        roles: ['ROLE_USER']
                    user3:
                        password: '$2y$13$h97IKzpvKSq78T2plCnXNe0CPXTCmqNVJlx3OD91BU9xCpjqXmVUC'  # bcrypt hash à générer
                        roles: ['ROLE_ADMIN']
                    user4:
                        password: '$2y$13$h97IKzpvKSq78T2plCnXNe0CPXTCmqNVJlx3OD91BU9xCpjqXmVUC'  # bcrypt hash à générer
                        roles: ['ROLE_USER']
                    user5:
                        password: '$2y$13$h97IKzpvKSq78T2plCnXNe0CPXTCmqNVJlx3OD91BU9xCpjqXmVUC'  # bcrypt hash à générer
                        roles: ['ROLE_ADMIN']
                    user6:
                        password: '$2y$13$h97IKzpvKSq78T2plCnXNe0CPXTCmqNVJlx3OD91BU9xCpjqXmVUC'  # bcrypt hash à générer
                        roles: ['ROLE_USER']

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        main:
            lazy: true
            provider: users_in_memory
            form_login:
                login_path: app_home
                check_path: app_home
                default_target_path: app_dashboard
                username_parameter: _username
                password_parameter: _password
                csrf_token_id: authenticate
            logout:
                path: app_logout
                target: app_home
            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800  # 1 semaine

            # Activate different ways to authenticate:
            # https://symfony.com/doc/current/security.html#the-firewall

            # https://symfony.com/doc/current/security/impersonating_user.html
            # switch_user: true

    # Note: Only the *first* matching rule is applied
    access_control:
        - { path: ^/$,          roles: PUBLIC_ACCESS }
        - { path: ^/dashboard,  roles: ROLE_USER }
        - { path: ^/search,     roles: ROLE_USER }
        - { path: ^/database,   roles: ROLE_ADMIN }
        # - { path: ^/admin, roles: ROLE_ADMIN }
        # - { path: ^/profile, roles: ROLE_USER }

    role_hierarchy:
        ROLE_ADMIN: [ROLE_USER]

when@test:
    security:
        password_hashers:
            # Password hashers are resource-intensive by design to ensure security.
            # In tests, it's safe to reduce their cost to improve performance.
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon
